name: semanticlens

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-semanticlens}
      POSTGRES_USER: ${POSTGRES_USER:-semanticlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-semanticlens} -d ${POSTGRES_DB:-semanticlens}"]
      interval: 5s
      timeout: 5s
      retries: 20

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.enrollment.enabled: "false"
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms1g -Xmx1g}
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  # One-shot / on-demand job, not part of `docker compose up`.
  # Run with: docker compose run --rm ingestion python ingest.py <args>
  ingestion:
    build: ./ingestion
    profiles: ["tools"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-semanticlens}
      POSTGRES_USER: ${POSTGRES_USER:-semanticlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      SOCRATA_APP_TOKEN: ${SOCRATA_APP_TOKEN:-}
    volumes:
      - ./Data:/data:ro
      - ./ingestion:/app
    depends_on:
      postgres:
        condition: service_healthy

  # One-shot / on-demand job, not part of `docker compose up`.
  # Run with: docker compose run --rm embedding
  embedding:
    build:
      context: .
      dockerfile: embedding/Dockerfile
    profiles: ["tools"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-semanticlens}
      POSTGRES_USER: ${POSTGRES_USER:-semanticlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - ./embedding:/app
      - ./shared:/app/shared
      - hfcache:/hf-cache
    depends_on:
      postgres:
        condition: service_healthy

  # One-shot / on-demand job, not part of `docker compose up`.
  # Needs ANTHROPIC_API_KEY in .env. Run with: docker compose run --rm enrichment
  enrichment:
    build: ./enrichment
    profiles: ["tools"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-semanticlens}
      POSTGRES_USER: ${POSTGRES_USER:-semanticlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./enrichment:/app
    depends_on:
      postgres:
        condition: service_healthy

  # One-shot / on-demand job, not part of `docker compose up`.
  # Run with: docker compose run --rm indexer
  indexer:
    build: ./indexer
    profiles: ["tools"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-semanticlens}
      POSTGRES_USER: ${POSTGRES_USER:-semanticlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      ES_HOST: http://elasticsearch:9200
    volumes:
      - ./indexer:/app
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  # Serving layer (C5 query understanding + C6 retrieval). Part of the
  # default `docker compose up` stack per SPEC §5 DoD.
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      ES_HOST: http://elasticsearch:9200
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-semanticlens}
      POSTGRES_USER: ${POSTGRES_USER:-semanticlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - ./api:/app
      - ./shared:/app/shared
      - hfcache:/hf-cache
    depends_on:
      elasticsearch:
        condition: service_healthy

  # Evaluation only — FAISS is quarantined in this image, never in serving.
  # Run with: docker compose run --rm eval            (recall + precision report)
  #           docker compose run --rm eval python pool.py   (labeling sheet)
  eval:
    build:
      context: .
      dockerfile: eval/Dockerfile
    profiles: ["tools"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-semanticlens}
      POSTGRES_USER: ${POSTGRES_USER:-semanticlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      ES_HOST: http://elasticsearch:9200
      API_URL: http://api:8000
      OUT_DIR: /data
    volumes:
      - ./eval:/app
      - ./shared:/app/shared
      - ./Data:/data
      - hfcache:/hf-cache
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      api:
        condition: service_started

volumes:
  pgdata:
  esdata:
  hfcache:
